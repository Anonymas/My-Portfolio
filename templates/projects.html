{% extends 'base.html' %}
{% block content %}
<section class="projects">
  <h2>My Projects</h2>
  <div class="project-grid">
    {% for p in projects %}
      <div class="project-card" id="project-{{ p.id }}">

        {% if p.image1 %}
        <img src="{{ url_for('static', filename='project_images/' ~ p.image1) }}" 
              class="card-img-top"
                     alt="{{ p.title }}"
                     style="object-fit: cover; height: 160px;">
    {% endif %}

    {% if p.image2 %}
        <img src="{{ url_for('static', filename='project_images/' ~ p.image2) }}" 
              class="card-img-top"
                     alt="{{ p.title }}"
                     style="object-fit: cover; height: 160px;">
    {% endif %}

        <h3>{{ p.title }}</h3>
        <p>{{ p.summary }}</p>
        <p>{{ p.description }}</p>
        <a href="{{ url_for('project_detail', project_id=p.id) }}" class="btn btn-primary">
View Project
</a>
      </div>
   

    {% else %}
        <p class="text-muted">No projects added yet.</p>
    {% endfor %}
  </div>
</section>
{% endblock %}
